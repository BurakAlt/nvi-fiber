events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }

    upstream admin {
        server admin:80;
    }

    # HTTP → HTTPS yönlendirme (sertifika eklenince aktif et)
    # server {
    #     listen 80;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;

        # API
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WhatsApp webhook
        location /webhook/ {
            proxy_pass http://api/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Admin panel
        location / {
            proxy_pass http://admin/;
            proxy_set_header Host $host;
        }
    }
}
